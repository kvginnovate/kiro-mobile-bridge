    function fixContextWindowCircles() {
      panels.chat.content.querySelectorAll('svg').forEach(svg => {
        const circles = svg.querySelectorAll('circle');
        if (circles.length >= 1) {
          let progressCircle = null;
          circles.forEach(circle => {
            const dashArray = circle.getAttribute('stroke-dasharray') || circle.style.strokeDasharray;
            if (dashArray && dashArray !== 'none') progressCircle = circle;
          });

          if (progressCircle && !svg.querySelector('circle[data-track="true"]')) {
            const cx = progressCircle.getAttribute('cx') || '8';
            const cy = progressCircle.getAttribute('cy') || '8';
            const r = progressCircle.getAttribute('r') || '6';
            const strokeWidth = progressCircle.getAttribute('stroke-width') || '2';

            const trackCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            trackCircle.setAttribute('cx', cx);
            trackCircle.setAttribute('cy', cy);
            trackCircle.setAttribute('r', r);
            trackCircle.setAttribute('stroke', '#3c3c3c');
            trackCircle.setAttribute('stroke-width', strokeWidth);
            trackCircle.setAttribute('fill', 'none');
            trackCircle.setAttribute('data-track', 'true');

            svg.insertBefore(trackCircle, svg.firstChild);
            progressCircle.setAttribute('stroke', '#4ade80');
          }
        }
      });
    }

    // =============================================================================
    // Editor Rendering
    // =============================================================================
    function renderEditorSnapshot(data, isUpdate = false) {
      const scrollTop = panels.editor.content.scrollTop;
      panels.editor.filename.textContent = data.fileName || 'Untitled';
      panels.editor.header.style.display = 'flex';
      closeEditorSearch();

      if (data.content?.trim().length > 0) {
        const lines = data.content.split('\n');
        let html = '';

        // Show info banner for partial content
        if (data.isPartial || data.note) {
          const noteText = data.note || 'Showing visible lines only. Use Explorer to open full file.';
          html += `<div style="padding: 10px 12px; background: linear-gradient(135deg, #2d2d30 0%, #252526 100%); color: #a78bfa; font-size: 12px; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 8px;">
            <span class="codicon codicon-warning" style="color: #f0b429;"></span>
            <span>${noteText}</span>
          </div>`;
        }

        html += '<pre class="editor-code">';
        const startLineNum = data.startLine || 1;
        let startIdx = 0;
        // Skip leading empty lines (max 3)
        while (startIdx < lines.length && lines[startIdx].trim() === '' && startIdx < 3) startIdx++;

        lines.slice(startIdx).forEach((line, idx) => {
          const lineNum = startLineNum + startIdx + idx;
          const highlighted = highlightSyntax(line.replace(/\t/g, '  '), data.language);
          html += `<div class="editor-line"><span class="editor-line-num">${lineNum}</span><span class="editor-line-code">${highlighted || ' '}</span></div>`;
        });
        html += '</pre>';

        // Footer with line info
        const endLine = startLineNum + startIdx + lines.slice(startIdx).length - 1;
        const lineInfo = data.lineCount
          ? `Lines ${startLineNum}-${endLine} of ${data.lineCount}`
          : `Lines ${startLineNum}-${endLine}`;
        const fullFileIndicator = !data.isPartial && data.lineCount && endLine >= data.lineCount
          ? ' <span style="color: #4caf50;">✓ Complete file</span>'
          : '';

        html += `<div style="padding: 6px 12px; background: #252526; color: #666; font-size: 11px; border-top: 1px solid #3c3c3c;">
          ${lineInfo}${fullFileIndicator}
        </div>`;

        panels.editor.content.innerHTML = html;
        panels.editor.content.style.display = 'block';
      } else {
        showEmptyState('editor', 'codicon-file-code', 'No editor content available.');
        return;
      }

      hideLoading('editor');
      if (isUpdate) panels.editor.content.scrollTop = scrollTop;
    }

    function highlightSyntax(line, language) {
      const escaped = escapeHtml(line);
      if (escaped.length > 1000 || !language) return escaped;

      const isJS = ['javascript', 'typescript', 'jsx', 'tsx', 'js', 'ts'].includes(language);
      const isPython = language === 'python' || language === 'py';

      let result = '';
      let i = 0;

      while (i < escaped.length) {
        // Comments
        if (isJS && escaped.slice(i, i + 2) === '//') { result += '<span class="tok-cmt">' + escaped.slice(i) + '</span>'; break; }
        if ((isPython) && escaped[i] === '#') { result += '<span class="tok-cmt">' + escaped.slice(i) + '</span>'; break; }

        // Strings
        if (escaped.slice(i, i + 6) === '&quot;') {
          const endIdx = escaped.indexOf('&quot;', i + 6);
          if (endIdx !== -1) { result += '<span class="tok-str">' + escaped.slice(i, endIdx + 6) + '</span>'; i = endIdx + 6; continue; }
        }
        if (escaped.slice(i, i + 5) === '&#39;') {
          const endIdx = escaped.indexOf('&#39;', i + 5);
          if (endIdx !== -1) { result += '<span class="tok-str">' + escaped.slice(i, endIdx + 5) + '</span>'; i = endIdx + 5; continue; }
        }

        // Numbers
        if (/[0-9]/.test(escaped[i]) && (i === 0 || /[^a-zA-Z_]/.test(escaped[i - 1]))) {
          let numEnd = i;
          while (numEnd < escaped.length && /[0-9.]/.test(escaped[numEnd])) numEnd++;
          if (numEnd > i) { result += '<span class="tok-num">' + escaped.slice(i, numEnd) + '</span>'; i = numEnd; continue; }
        }

        // Keywords
        if (/[a-zA-Z_]/.test(escaped[i]) && (i === 0 || /[^a-zA-Z0-9_]/.test(escaped[i - 1]))) {
          let wordEnd = i;
          while (wordEnd < escaped.length && /[a-zA-Z0-9_]/.test(escaped[wordEnd])) wordEnd++;
          const word = escaped.slice(i, wordEnd);

          let keywords = [];
          if (isJS) keywords = ['const', 'let', 'var', 'function', 'return', 'if', 'else', 'for', 'while', 'import', 'export', 'from', 'async', 'await', 'try', 'catch', 'throw', 'new', 'this', 'class', 'extends', 'true', 'false', 'null', 'undefined'];
          else if (isPython) keywords = ['def', 'class', 'return', 'if', 'elif', 'else', 'for', 'while', 'import', 'from', 'as', 'try', 'except', 'raise', 'with', 'async', 'await', 'None', 'True', 'False', 'self'];

          if (keywords.includes(word)) result += '<span class="tok-kw">' + word + '</span>';
          else result += word;
          i = wordEnd;
          continue;
        }

        result += escaped[i];
        i++;
      }

      return result;
    }

    // =============================================================================
    // Editor Search
    // =============================================================================
    function openEditorSearch() {
      $('editorSearchBar').classList.add('open');
      $('editorSearchInput').focus();
      $('editorSearchInput').select();
    }

    function closeEditorSearch() {
      $('editorSearchBar').classList.remove('open');
      $('editorSearchInput').value = '';
      searchMatches = [];
      currentMatchIndex = -1;
      $('editorSearchCount').textContent = '';
      panels.editor.content.querySelectorAll('.editor-line-code[data-original-html]').forEach(el => {
        el.innerHTML = el.dataset.originalHtml;
        delete el.dataset.originalHtml;
      });
    }

    function performSearch(query) {
      panels.editor.content.querySelectorAll('.editor-line-code[data-original-html]').forEach(el => {
        el.innerHTML = el.dataset.originalHtml;
        delete el.dataset.originalHtml;
      });
      searchMatches = [];
      currentMatchIndex = -1;

      if (!query || query.length < 1) { $('editorSearchCount').textContent = ''; return; }

      const queryLower = query.toLowerCase();
      panels.editor.content.querySelectorAll('.editor-line-code').forEach((lineEl, lineIndex) => {
        const text = lineEl.textContent;
        const textLower = text.toLowerCase();
        let startIndex = 0, matchIndex;

        while ((matchIndex = textLower.indexOf(queryLower, startIndex)) !== -1) {
          searchMatches.push({ lineIndex, lineEl, startIndex: matchIndex, endIndex: matchIndex + query.length });
          startIndex = matchIndex + 1;
        }
      });

      if (searchMatches.length > 0) {
        highlightSearchMatches(query);
        currentMatchIndex = 0;
        scrollToSearchMatch(0);
        updateSearchCount();
      } else {
        $('editorSearchCount').textContent = 'No results';
      }
    }

    function highlightSearchMatches(query) {
      const queryLower = query.toLowerCase();
      panels.editor.content.querySelectorAll('.editor-line-code').forEach(lineEl => {
        const text = lineEl.textContent;
        if (text.toLowerCase().includes(queryLower)) {
          if (!lineEl.dataset.originalHtml) lineEl.dataset.originalHtml = lineEl.innerHTML;

          const matches = [];
          let idx = 0;
          while ((idx = text.toLowerCase().indexOf(queryLower, idx)) !== -1) {
            matches.push({ start: idx, end: idx + query.length });
            idx++;
          }

          if (matches.length > 0) {
            let result = '', lastEnd = 0;
            matches.forEach(match => {
              result += escapeHtml(text.slice(lastEnd, match.start));
              result += `<span class="search-highlight">${escapeHtml(text.slice(match.start, match.end))}</span>`;
              lastEnd = match.end;
            });
            result += escapeHtml(text.slice(lastEnd));
            lineEl.innerHTML = result;
          }
        }
      });
    }

    function scrollToSearchMatch(index) {
      const highlights = panels.editor.content.querySelectorAll('.search-highlight');
      highlights.forEach(el => el.classList.remove('current'));

      if (highlights[index]) {
        highlights[index].classList.add('current');
        const lineEl = highlights[index].closest('.editor-line');
        if (lineEl) {
          const container = panels.editor.content;
          const containerRect = container.getBoundingClientRect();
          const lineRect = lineEl.getBoundingClientRect();
          const scrollTop = container.scrollTop + (lineRect.top - containerRect.top) - (containerRect.height / 2) + (lineRect.height / 2);
          container.scrollTo({ top: Math.max(0, scrollTop), behavior: 'smooth' });
        }
      }
    }

    function updateSearchCount() {
      $('editorSearchCount').textContent = searchMatches.length > 0 ? `${currentMatchIndex + 1}/${searchMatches.length}` : 'No results';
    }

    function goToNextMatch() {
      if (searchMatches.length === 0) return;
      currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length;
      scrollToSearchMatch(currentMatchIndex);
      updateSearchCount();
    }

    function goToPrevMatch() {
      if (searchMatches.length === 0) return;
      currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length;
      scrollToSearchMatch(currentMatchIndex);
      updateSearchCount();
    }

    // Setup search
    $('editorSearchBtn').onclick = openEditorSearch;
    $('editorSearchClose').onclick = closeEditorSearch;
    $('editorSearchNext').onclick = goToNextMatch;
    $('editorSearchPrev').onclick = goToPrevMatch;
    $('editorSearchInput').oninput = (e) => performSearch(e.target.value);
    $('editorSearchInput').onkeydown = (e) => {
      if (e.key === 'Enter') { e.preventDefault(); e.shiftKey ? goToPrevMatch() : goToNextMatch(); }
      else if (e.key === 'Escape') closeEditorSearch();
    };
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'f' && activePanel === 'editor') { e.preventDefault(); openEditorSearch(); }
    });

    // =============================================================================
    // File Tree
    // =============================================================================
    function toggleFileTree() {
      fileTreeOpen = !fileTreeOpen;
      fileTreeDropdown.classList.toggle('open', fileTreeOpen);
      explorerChevron.style.transform = fileTreeOpen ? 'rotate(180deg)' : '';
      if (fileTreeOpen && workspaceFiles.length === 0) fetchWorkspaceFiles();
      else if (fileTreeOpen) renderFileTree(workspaceFiles);
    }

    function closeFileTree() {
      fileTreeOpen = false;
      fileTreeDropdown.classList.remove('open');
      explorerChevron.style.transform = '';
    }

    async function fetchWorkspaceFiles() {
      if (!selectedCascadeId) return;
      fileTree.innerHTML = '<div class="file-tree-loading"><div class="loading-spinner"></div>Loading files...</div>';

      try {
        const r = await fetch(`/files/${selectedCascadeId}`);
        if (!r.ok) throw new Error('Failed to fetch files');
        const data = await r.json();
        workspaceFiles = data.files || [];
        renderFileTree(workspaceFiles);
      } catch (e) {
        fileTree.innerHTML = '<div class="file-tree-empty">Failed to load files</div>';
      }
    }

    function buildFileTree(files) {
      const root = { folders: {}, files: [] };
      files.forEach(file => {
        const parts = file.path.split(/[/\\]/);
        let current = root;
        for (let i = 0; i < parts.length - 1; i++) {
          const folderName = parts[i];
          if (!current.folders[folderName]) current.folders[folderName] = { folders: {}, files: [] };
          current = current.folders[folderName];
        }
        current.files.push({ name: parts[parts.length - 1], path: file.path });
      });
      return root;
    }

    function getFileIcon(name) {
      const ext = name.split('.').pop()?.toLowerCase();
      const iconMap = {
        'js': 'codicon-file-code', 'jsx': 'codicon-file-code', 'ts': 'codicon-file-code', 'tsx': 'codicon-file-code',
        'html': 'codicon-file-code', 'css': 'codicon-file-code', 'json': 'codicon-json', 'md': 'codicon-markdown',
        'py': 'codicon-file-code', 'java': 'codicon-file-code', 'go': 'codicon-file-code', 'rs': 'codicon-file-code',
        'sql': 'codicon-database', 'txt': 'codicon-file'
      };
      return iconMap[ext] || 'codicon-file';
    }

    function renderTreeNode(node, path = '') {
      let html = '';
      const folderNames = Object.keys(node.folders).sort();
      const sortedFiles = [...node.files].sort((a, b) => a.name.localeCompare(b.name));

      folderNames.forEach(folderName => {
        const folderPath = path ? `${path}/${folderName}` : folderName;
        const isExpanded = expandedFolders.has(folderPath);
        html += `<div class="file-tree-folder" data-path="${escapeHtml(folderPath)}">
          <div class="file-tree-folder-header" data-folder="${escapeHtml(folderPath)}">
            <span class="file-tree-folder-icon codicon codicon-chevron-right ${isExpanded ? 'expanded' : ''}"></span>
            <span class="codicon codicon-folder${isExpanded ? '-opened' : ''}" style="color: #a78bfa;"></span>
            <span class="file-tree-folder-name">${escapeHtml(folderName)}</span>
          </div>
          <div class="file-tree-folder-contents ${isExpanded ? 'expanded' : ''}">${renderTreeNode(node.folders[folderName], folderPath)}</div>
        </div>`;
      });

      sortedFiles.forEach(file => {
        html += `<div class="file-tree-file" data-path="${escapeHtml(file.path)}">
          <span class="file-tree-file-icon codicon ${getFileIcon(file.name)}"></span>
          <span class="file-tree-file-name">${escapeHtml(file.name)}</span>
        </div>`;
      });

      return html;
    }

    function renderFileTree(files) {
      if (files.length === 0) { fileTree.innerHTML = '<div class="file-tree-empty">No files found</div>'; return; }

      const tree = buildFileTree(files);
      fileTree.innerHTML = renderTreeNode(tree);

      fileTree.querySelectorAll('.file-tree-folder-header').forEach(header => {
        header.onclick = (e) => {
          e.stopPropagation();
          const folderPath = header.dataset.folder;
          const folder = header.closest('.file-tree-folder');
          const contents = folder.querySelector('.file-tree-folder-contents');
          const chevron = header.querySelector('.file-tree-folder-icon');
          const folderIcon = header.querySelector('.codicon-folder, .codicon-folder-opened');

          if (expandedFolders.has(folderPath)) {
            expandedFolders.delete(folderPath);
            contents.classList.remove('expanded');
            chevron.classList.remove('expanded');
            folderIcon.classList.remove('codicon-folder-opened');
            folderIcon.classList.add('codicon-folder');
          } else {
            expandedFolders.add(folderPath);
            contents.classList.add('expanded');
            chevron.classList.add('expanded');
            folderIcon.classList.remove('codicon-folder');
            folderIcon.classList.add('codicon-folder-opened');
          }
        };
      });

      fileTree.querySelectorAll('.file-tree-file').forEach(item => {
        item.onclick = () => { closeFileTree(); openFileInEditor(item.dataset.path); };
      });
    }

    // =============================================================================
    // Chat Interactivity
    // =============================================================================
    function makeInteractive() {
      const content = panels.chat.content;

      // Make specific task-option cards plain text (non-clickable)
      const nonClickablePhrases = [
        'keep optional tasks',
        'make all tasks required'
      ];
      try {
        const clickableSelectors = 'button, [role="button"], [tabindex="0"], [class*="option"], [class*="choice"]';
        content.querySelectorAll(clickableSelectors).forEach(el => {
          const text = (el.textContent || '').toLowerCase();
          if (!text || text.length < 10) return;
          if (nonClickablePhrases.some(p => text.includes(p))) {
            const clickable = el.closest(clickableSelectors) || el;
            clickable.dataset.kiroPlainText = 'true';
            clickable.style.pointerEvents = 'none';
            clickable.style.cursor = 'default';
            clickable.onclick = null;
          }
        });
      } catch (e) { }


      // =======================================================================
      // GLOBAL CLICK HANDLER - Makes entire chat snapshot clickable
      // =======================================================================
      // Remove any existing global handler first
      if (content._globalClickHandler) {
        content.removeEventListener('click', content._globalClickHandler);
      }

      content._globalClickHandler = async (e) => {
        // Find the actual clicked element
        let target = e.target;

        // Skip if this is a send button (has its own handler)
        const sendBtn = target.closest('[data-send-handler-attached="true"]');
        if (sendBtn) {
          return; // Let the specific send handler deal with it
        }

        if (target.closest('[data-kiro-plain-text="true"]')) {
          return;
        }

        const noticeContainer = target.closest('.kiro-snackbar, [class*="snackbar"]');
        if (noticeContainer) {
          const noticeText = (noticeContainer.textContent || '').toLowerCase();
          if (noticeText.includes('the current task list marks some tasks')) {
            return;
          }
        }


        // Skip if clicking on input fields
        if (target.matches('[contenteditable="true"], textarea, input, [data-lexical-editor="true"], .ProseMirror, .tiptap')) {
          return;
        }

        // Skip if clicking inside input containers
        if (target.closest('[contenteditable="true"], textarea, [data-lexical-editor="true"], .ProseMirror, .tiptap')) {
          return;
        }

        // Find the best clickable element (bubble up to find buttons, links, etc.)
        let clickableEl = target;
        const clickableSelectors = 'button, [role="button"], [role="tab"], [role="menuitem"], [role="option"], a, [tabindex="0"], [onclick]';

        // Check if target or any parent is clickable
        if (!target.matches(clickableSelectors)) {
          const closestClickable = target.closest(clickableSelectors);
          if (closestClickable && content.contains(closestClickable)) {
            clickableEl = closestClickable;
          }
        }

        // Get element info for the click
        const elementText = (clickableEl.textContent || '').trim().substring(0, 150);
        const ariaLabel = clickableEl.getAttribute('aria-label') || '';
        const role = clickableEl.getAttribute('role') || '';
        const tag = clickableEl.tagName?.toLowerCase() || 'div';
        const className = clickableEl.className || '';

        // Check if this is an icon button (has codicon child)
        const hasIcon = clickableEl.querySelector('[class*="codicon"]') ||
          (typeof className === 'string' && className.includes('codicon'));

        // Skip if no meaningful content to click (but allow icon buttons and buttons with aria-label)
        if (!elementText && !ariaLabel && !hasIcon && tag === 'div' && !role) {
          return;
        }

        // For icon-only buttons, use aria-label as text
        const effectiveText = elementText || ariaLabel;

        // Determine click type based on context
        let clickInfo = {
          tag: tag,
          text: effectiveText,
          ariaLabel: ariaLabel,
          role: role,
          className: typeof className === 'string' ? className.substring(0, 200) : ''
        };

        // Add specific flags based on element characteristics
        if (role === 'tab') clickInfo.isTab = true;
        if (role === 'switch' || className.includes('toggle')) clickInfo.isToggle = true;
        if (ariaLabel.toLowerCase() === 'close' || className.includes('close')) clickInfo.isCloseButton = true;

        // Check for file links
        const fileExtensions = /\.(ts|tsx|js|jsx|py|java|html|css|json|md|yaml|yml|xml|sql|go|rs|c|cpp|h|cs|rb|php|sh|vue|svelte)$/i;
        if (fileExtensions.test(elementText)) {
          clickInfo.isFileLink = true;
          clickInfo.filePath = elementText;
        }

        // Check for command trust options - more comprehensive detection
        const lowerText = elementText.toLowerCase();
        const isCommandTrust = lowerText.includes('full command') ||
          lowerText.includes('partial') ||
          lowerText.includes('base npm') ||
          lowerText.includes('base ') ||
          lowerText.includes('trust') ||
          (lowerText.includes('command') && (lowerText.includes('allow') || lowerText.includes('run')));

        // Also check if we're in a command trust context (snackbar with trust-related content)
        const inSnackbar = clickableEl.closest('.kiro-snackbar, [class*="snackbar"]');
        const snackbarHasTrustContent = inSnackbar && (
          inSnackbar.textContent.toLowerCase().includes('trust') ||
          inSnackbar.textContent.toLowerCase().includes('command') ||
          inSnackbar.textContent.toLowerCase().includes('allow')
        );

        if (isCommandTrust || (snackbarHasTrustContent && lowerText.length < 100)) {
          clickInfo.isCommandTrustOption = true;
        }

        // Check for action buttons (play, edit, cancel, etc.) - enhanced detection
        const hasPlayIcon = clickableEl.querySelector('.codicon-play, .codicon-run, .codicon-debug-start, .codicon-triangle-right');
        const hasEditIcon = clickableEl.querySelector('.codicon-edit, .codicon-pencil');
        const hasCancelIcon = clickableEl.querySelector('.codicon-x, .codicon-close, .codicon-chrome-close');
        const hasCheckIcon = clickableEl.querySelector('.codicon-check, .codicon-pass, .codicon-check-all');
        const hasStopIcon = clickableEl.querySelector('.codicon-debug-stop, .codicon-stop');

        // Also check aria-label for action type (important for icon-only buttons)
        const ariaLabelLower = ariaLabel.toLowerCase();
        const isRunByAria = ariaLabelLower.includes('run') || ariaLabelLower.includes('play') || ariaLabelLower.includes('execute');
        const isEditByAria = ariaLabelLower.includes('edit') || ariaLabelLower.includes('modify');
        const isCancelByAria = ariaLabelLower.includes('cancel') || ariaLabelLower.includes('reject') || ariaLabelLower.includes('deny');
        const isApproveByAria = ariaLabelLower.includes('approve') || ariaLabelLower.includes('accept') || ariaLabelLower.includes('allow');
        const isStopByAria = ariaLabelLower.includes('stop') || ariaLabelLower.includes('terminate');

        // Also check for colored buttons (green play button)
        const btnStyle = window.getComputedStyle(clickableEl);
        const bgColor = btnStyle.backgroundColor || '';
        const isGreenButton = bgColor.includes('rgb(34, 197') || bgColor.includes('rgb(0, 128') ||
          bgColor.includes('rgb(22, 163') || bgColor.includes('green');

        // Detect action type from icons OR aria-label
        if (hasPlayIcon || isRunByAria || (isGreenButton && tag === 'button')) {
          clickInfo.isCommandPanelAction = true;
          clickInfo.actionType = 'run';
        }
        else if (hasEditIcon || isEditByAria) {
          clickInfo.isCommandPanelAction = true;
          clickInfo.actionType = 'edit';
        }
        else if ((hasCancelIcon || isCancelByAria) && !clickInfo.isCloseButton) {
          clickInfo.isCommandPanelAction = true;
          clickInfo.actionType = 'cancel';
        }
        else if (hasCheckIcon || isApproveByAria) {
          clickInfo.isCommandPanelAction = true;
          clickInfo.actionType = 'approve';
        }
        else if (hasStopIcon || isStopByAria) {
          clickInfo.isCommandPanelAction = true;
          clickInfo.actionType = 'stop';
        }

        // Check if in snackbar/notification area
        if (clickableEl.closest('.kiro-snackbar, [class*="snackbar"], [class*="notification"]')) {
          if (!clickInfo.isCommandTrustOption && !clickInfo.isCommandPanelAction) {
            clickInfo.isNotificationButton = true;
          }
        }

        // Check if in dialog or welcome/onboarding screen
        if (clickableEl.closest('[role="dialog"], [role="alertdialog"], [class*="modal"], [class*="dialog"], [class*="welcome"], [class*="Welcome"], [class*="onboarding"], [class*="Onboarding"], [class*="build"], [class*="Build"], [class*="choice"], [class*="Choice"]')) {
          clickInfo.isDialogChoice = true;
          // Dialog choices take priority over notification buttons
          clickInfo.isNotificationButton = false;
        }

        // Also check if the element itself looks like a choice card (has title + description structure)
        const hasChoiceStructure = clickableEl.children.length >= 1 &&
          clickableEl.children.length <= 5 &&
          (clickableEl.querySelector('h1, h2, h3, h4, h5, h6, [class*="title"], [class*="Title"]') ||
            clickableEl.querySelector('p, [class*="description"], [class*="Description"]'));

        if (hasChoiceStructure && !clickInfo.isDialogChoice) {
          // Check if it looks clickable
          const style = window.getComputedStyle(clickableEl);
          if (style.cursor === 'pointer' || clickableEl.getAttribute('tabindex') === '0' ||
            clickableEl.getAttribute('role') === 'button' || tag === 'button') {
            clickInfo.isDialogChoice = true;
            // Dialog choices take priority over notification buttons
            clickInfo.isNotificationButton = false;
          }
        }

        // ADDITIONAL CHECK: If element is in snackbar-body and has substantial text, it's likely a dialog choice
        const inSnackbarBody = clickableEl.closest('.kiro-snackbar-body');
        if (inSnackbarBody && effectiveText && effectiveText.length > 15) {
          // This is a choice option in a snackbar, not a simple notification button
          clickInfo.isDialogChoice = true;
          clickInfo.isNotificationButton = false;
        }

        // =======================================================================
        // ELEMENT INDEX - For distinguishing between multiple elements with same text
        // This is critical for buttons like "Restore" that appear on each message
        // =======================================================================
        if (effectiveText && tag) {
          // For "Restore" specifically, search ALL clickable elements, not just buttons
          const searchText = effectiveText.toLowerCase().trim();
          // Use standard selector based on tag
          const selector = tag === 'button' ? 'button, [role="button"]' :
            tag === 'a' ? 'a, [role="link"]' :
              `${tag}, [role="button"], button`;

          const allSimilar = content.querySelectorAll(selector);
          const matchingElements = [];

          for (const el of allSimilar) {
            const elText = (el.textContent || '').trim();
            const elAriaLabel = el.getAttribute('aria-label') || '';

            // Match elements with same text OR same aria-label (case-insensitive)
            const textMatches = elText.toLowerCase() === searchText ||
              (elText.length > 0 && elText.toLowerCase().includes(searchText)) ||
              (searchText.length > 0 && searchText.includes(elText.toLowerCase()));

            const ariaMatches = elAriaLabel &&
              elAriaLabel.toLowerCase() === searchText;

            if (textMatches || ariaMatches) {
              matchingElements.push(el);
            }
          }

          // Find the index of the clicked element among matching elements
          let elementIndex = matchingElements.indexOf(clickableEl);

          // If direct reference match fails, try finding by position/attributes
          if (elementIndex < 0 && matchingElements.length > 1) {
            // Try to find by comparing element properties
            for (let i = 0; i < matchingElements.length; i++) {
              const el = matchingElements[i];
              if (el.isSameNode && el.isSameNode(clickableEl)) {
                elementIndex = i;
                break;
              }
              // Compare by bounding rect as fallback
              const clickedRect = clickableEl.getBoundingClientRect();
              const elRect = el.getBoundingClientRect();
              if (Math.abs(clickedRect.top - elRect.top) < 5 &&
                Math.abs(clickedRect.left - elRect.left) < 5) {
                elementIndex = i;
                break;
              }
            }
          }

          if (elementIndex >= 0 && matchingElements.length > 1) {
            clickInfo.elementIndex = elementIndex;
            clickInfo.totalMatches = matchingElements.length;
          } else if (matchingElements.length > 1) {
            // FALLBACK: Use visual position (top to bottom order)
            const sortedByPosition = [...matchingElements].sort((a, b) => {
              const rectA = a.getBoundingClientRect();
              const rectB = b.getBoundingClientRect();
              return rectA.top - rectB.top;
            });

            const clickedRect = clickableEl.getBoundingClientRect();
            for (let i = 0; i < sortedByPosition.length; i++) {
              const elRect = sortedByPosition[i].getBoundingClientRect();
              if (Math.abs(clickedRect.top - elRect.top) < 10 &&
                Math.abs(clickedRect.left - elRect.left) < 10) {
                clickInfo.elementIndex = i;
                clickInfo.totalMatches = matchingElements.length;
                break;
              }
            }
          }
        }

        console.log('[GlobalClick]', clickInfo.text?.substring(0, 40) || clickInfo.ariaLabel || tag);

        e.preventDefault();
        e.stopPropagation();

        await sendClickToKiro(clickInfo);

        // Refresh snapshot after click
        setTimeout(() => fetchChatSnapshot(selectedCascadeId), 150);
      };

      content.addEventListener('click', content._globalClickHandler);

      // =======================================================================
      // INPUT FIELDS - Special handling for text input
      // =======================================================================
      // Input fields
      const inputSelectors = ['[data-lexical-editor="true"]', '[contenteditable="true"]', 'textarea', '.ProseMirror', '.tiptap'];
      inputSelectors.forEach(selector => {
        content.querySelectorAll(selector).forEach(el => {
          el.style.cursor = 'text';
          el.addEventListener('focus', () => { isTypingInKiroInput = true; });
          el.addEventListener('blur', () => { setTimeout(() => { isTypingInKiroInput = false; }, 200); });
          el.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
              e.preventDefault();
              const text = el.textContent || el.value || '';
              if (text.trim()) {
                await sendToKiro(text.trim());
                el.textContent = ''; el.innerHTML = '';
                isTypingInKiroInput = false;
              }
            }
          });
        });
      });

      // Send button
      const attachSendHandler = (btn) => {
        if (!btn || btn.dataset.sendHandlerAttached) return;
        btn.dataset.sendHandlerAttached = 'true';
        btn.setAttribute('data-send-handler-attached', 'true'); // For global handler check
        btn.removeAttribute('disabled');
        btn.style.cursor = 'pointer';

        btn.onclick = async (e) => {
          e.preventDefault(); e.stopPropagation();
          let inputText = '', inputEl = null;

          // Find the ACTUAL chat input (last visible editor, not old messages)
          // Look for input containers first, then fall back to last visible editor
          const inputContainerSelectors = [
            '[class*="chat-input"]',
            '[class*="message-input"]',
            '[class*="composer"]',
            '[class*="input-area"]',
            '[class*="InputArea"]',
            'form[class*="chat"]'
          ];

          // Strategy 1: Find editor inside input container
          for (const containerSel of inputContainerSelectors) {
            const container = content.querySelector(containerSel);
            if (container) {
              const editorInContainer = container.querySelector('.tiptap, .ProseMirror, [data-lexical-editor="true"], [contenteditable="true"], textarea');
              if (editorInContainer && editorInContainer.offsetParent !== null) {
                inputEl = editorInContainer;
                inputText = editorInContainer.textContent || editorInContainer.innerText || editorInContainer.value || '';
                break;
              }
            }
          }

          // Strategy 2: Find editor near the submit button itself
          if (!inputEl) {
            const btnParent = btn.closest('form') || btn.parentElement?.parentElement?.parentElement;
            if (btnParent) {
              const nearbyEditor = btnParent.querySelector('.tiptap, .ProseMirror, [data-lexical-editor="true"], [contenteditable="true"], textarea');
              if (nearbyEditor && nearbyEditor.offsetParent !== null) {
                inputEl = nearbyEditor;
                inputText = nearbyEditor.textContent || nearbyEditor.innerText || nearbyEditor.value || '';
              }
            }
          }

          // Strategy 3: Get the LAST visible editor (input is typically at bottom)
          if (!inputEl) {
            for (const sel of ['.tiptap', '.ProseMirror', '[data-lexical-editor="true"]', '[contenteditable="true"]', 'textarea']) {
              const allEditors = [...content.querySelectorAll(sel)].filter(el => el.offsetParent !== null);
              if (allEditors.length > 0) {
                inputEl = allEditors.at(-1); // Get LAST one, not first
                inputText = inputEl.textContent || inputEl.innerText || inputEl.value || '';
                if (inputText.trim()) break;
              }
            }
          }

          if (inputText.trim()) {
            await sendToKiro(inputText.trim());
            // Don't clear input here - the server-side injection handles everything
            // Clearing here can cause race conditions with Kiro's UI
          } else {
            showToast('Type a message first', 1500);
          }
          return false;
        };
      };

      const submitBtn = content.querySelector('button[data-variant="submit"]');
      if (submitBtn) attachSendHandler(submitBtn);

      content.querySelectorAll('button').forEach(btn => {
        if (btn.dataset.sendHandlerAttached) return;
        if (btn.querySelector('.codicon-arrow-up, .codicon-send')) attachSendHandler(btn);
      });

      // Toggle switches - send click to Kiro and let snapshot refresh show actual state
      content.querySelectorAll('[role="switch"], input[type="checkbox"][role="switch"]').forEach(toggle => {
        const wrapper = toggle.closest('.kiro-toggle-switch') || toggle;
        wrapper.style.cursor = 'pointer';
        wrapper.onclick = async (e) => {
          e.preventDefault(); e.stopPropagation();
          const label = wrapper.querySelector('label');
          const toggleLabel = label ? label.textContent.trim() : 'toggle';

          console.log('[Toggle] Clicked:', toggleLabel);

          // Send click to Kiro - don't try to predict the new state
          // Just let the snapshot refresh show the actual state from Kiro
          await sendClickToKiro({ tag: 'div', text: toggleLabel, role: 'switch', isToggle: true });

          // Refresh snapshot after toggle to get actual Kiro state
          // Use 250ms delay to allow Kiro to process the toggle
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 250);

          return false;
        };
      });

      // Notification banner buttons (View all, X) in snackbar and agent-outcome
      // Note: Revert and Follow buttons are hidden
      // IMPORTANT: This handler must detect command panel actions and set appropriate flags
      const notificationSelectors = [
        '.kiro-snackbar button',
        '.kiro-snackbar-actions button',
        '.kiro-snackbar-header button',
        '.agent-outcome-notification button',
        '.agent-outcome button',
        '[class*="notification"] button',
        '[class*="outcome"] button'
      ];
      notificationSelectors.forEach(sel => {
        try {
          content.querySelectorAll(sel).forEach(btn => {
            const btnText = (btn.textContent || '').trim().toLowerCase();
            // Skip Follow and Revert buttons (hidden via CSS/JS)
            if (btnText.includes('follow') || btnText === 'revert') return;

            btn.style.cursor = 'pointer';
            btn.onclick = async (e) => {
              e.preventDefault(); e.stopPropagation();

              // Identify the button - for icon buttons use aria-label or detect close icon
              let buttonText = (btn.textContent || '').trim().substring(0, 50);
              const ariaLabel = btn.getAttribute('aria-label') || '';
              const ariaLabelLower = ariaLabel.toLowerCase();
              const isIconButton = btn.classList.contains('kiro-icon-button');
              const hasCloseIcon = btn.querySelector('.codicon-close, .codicon-x, [class*="close"]');

              // Detect command panel action icons
              const hasPlayIcon = btn.querySelector('.codicon-play, .codicon-run, .codicon-debug-start, .codicon-triangle-right');
              const hasEditIcon = btn.querySelector('.codicon-edit, .codicon-pencil');
              const hasCancelIcon = btn.querySelector('.codicon-x, .codicon-close, .codicon-chrome-close');
              const hasApproveIcon = btn.querySelector('.codicon-check, .codicon-pass, .codicon-check-all');
              const hasStopIcon = btn.querySelector('.codicon-debug-stop, .codicon-stop');

              // Detect action type from aria-label
              const isRunByAria = ariaLabelLower.includes('run') || ariaLabelLower.includes('play') || ariaLabelLower.includes('execute');
              const isEditByAria = ariaLabelLower.includes('edit');
              const isCancelByAria = ariaLabelLower.includes('cancel') || ariaLabelLower.includes('reject');
              const isApproveByAria = ariaLabelLower.includes('approve') || ariaLabelLower.includes('accept') || ariaLabelLower.includes('allow');
              const isStopByAria = ariaLabelLower.includes('stop') || ariaLabelLower.includes('terminate');

              // Detect action type from button text
              const btnTextLower = buttonText.toLowerCase();
              const isAcceptByText = btnTextLower.includes('accept') || btnTextLower.includes('approve') || btnTextLower.includes('allow');
              const isRunByText = btnTextLower.includes('run') || btnTextLower.includes('execute');
              const isCancelByText = btnTextLower.includes('cancel') || btnTextLower.includes('reject') || btnTextLower.includes('deny');

              // For X/close icon buttons with no text
              if (!buttonText && (isIconButton || hasCloseIcon)) {
                buttonText = ariaLabel || 'dismiss';
              }

              // Determine if this is a command panel action
              let actionType = '';
              let isCommandPanelAction = false;

              if (hasPlayIcon || isRunByAria || isRunByText) {
                actionType = 'run';
                isCommandPanelAction = true;
              } else if (hasEditIcon || isEditByAria) {
                actionType = 'edit';
                isCommandPanelAction = true;
              } else if (hasApproveIcon || isApproveByAria || isAcceptByText) {
                actionType = 'approve';
                isCommandPanelAction = true;
              } else if ((hasCancelIcon && !hasCloseIcon) || isCancelByAria || isCancelByText) {
                actionType = 'cancel';
                isCommandPanelAction = true;
              } else if (hasStopIcon || isStopByAria) {
                actionType = 'stop';
                isCommandPanelAction = true;
              }

              const clickInfo = {
                tag: 'button',
                text: buttonText,
                ariaLabel: ariaLabel,
                role: btn.getAttribute('role') || 'button',
                className: btn.className || '',
                isIconButton: isIconButton || !buttonText
              };

              // Set appropriate flags based on detection
              if (isCommandPanelAction) {
                clickInfo.isCommandPanelAction = true;
                clickInfo.actionType = actionType;
                console.log('[Click] Command action in notification area:', actionType, buttonText || ariaLabel);
              } else {
                clickInfo.isNotificationButton = true;
                console.log('[Click] Notification button:', clickInfo.text || clickInfo.ariaLabel || 'icon-button');
              }

              await sendClickToKiro(clickInfo);
              // Refresh after clicking notification buttons
              setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
              return false;
            };
          });
        } catch (e) { }
      });

      // Command trust dialog options - REMOVED (trust button is now hidden on mobile)

      // Command panel action buttons (play/run button in command header)
      // The green play button in command dialogs
      content.querySelectorAll('.kiro-snackbar button, .kiro-snackbar-header button, [class*="command"] button').forEach(btn => {
        if (btn.onclick) return;

        const ariaLabel = (btn.getAttribute('aria-label') || '').toLowerCase();
        const title = (btn.getAttribute('title') || '').toLowerCase();
        const hasPlayIcon = btn.querySelector('.codicon-play, .codicon-run, .codicon-debug-start, .codicon-triangle-right');
        const hasEditIcon = btn.querySelector('.codicon-edit, .codicon-pencil');
        const hasCancelIcon = btn.querySelector('.codicon-x, .codicon-close, .codicon-chrome-close');
        const hasApproveIcon = btn.querySelector('.codicon-check, .codicon-pass');

        // Determine action type
        let actionType = '';
        if (hasPlayIcon || ariaLabel.includes('run') || ariaLabel.includes('play') || title.includes('run')) {
          actionType = 'run';
        } else if (hasEditIcon || ariaLabel.includes('edit')) {
          actionType = 'edit';
        } else if (hasCancelIcon || ariaLabel.includes('cancel') || ariaLabel.includes('close')) {
          actionType = 'cancel';
        } else if (hasApproveIcon || ariaLabel.includes('approve') || ariaLabel.includes('accept')) {
          actionType = 'approve';
        }

        if (actionType) {
          btn.style.cursor = 'pointer';
          btn.onclick = async (e) => {
            e.preventDefault(); e.stopPropagation();

            const clickInfo = {
              tag: 'button',
              text: btn.getAttribute('aria-label') || btn.getAttribute('title') || actionType,
              ariaLabel: btn.getAttribute('aria-label') || '',
              role: btn.getAttribute('role') || 'button',
              className: btn.className || '',
              actionType: actionType,
              isCommandPanelAction: true,
              isIconButton: !btn.textContent?.trim()
            };
            console.log('[Click] Command panel action:', actionType);
            await sendClickToKiro(clickInfo);
            setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
            return false;
          };
        }
      });

      // =======================================================================
      // PRIORITY HANDLER: Snackbar body choice cards (spec workflow options)
      // These need special handling because they're in a scrollable container
      // Must run BEFORE general dialog choice handlers
      // =======================================================================
      const snackbarBody = content.querySelector('.kiro-snackbar-body');
      if (snackbarBody) {
        // Get all direct children and nested choice-like elements
        const snackbarChoices = snackbarBody.querySelectorAll(':scope > div, :scope > [class*="choice"], :scope > [class*="option"], [class*="choice"], [class*="option"]');
        snackbarChoices.forEach(item => {
          // Skip if already has our handler
          if (item.dataset.kiroClickHandler) return;
          // Skip buttons (handled separately)
          if (item.tagName === 'BUTTON') return;
          // Skip containers with too many children
          if (item.children.length > 8) return;

          const itemText = (item.textContent || '').trim();
          // Skip if no meaningful text (needs title + description typically)
          if (itemText.length < 20) return;

          // Mark as handled
          item.dataset.kiroClickHandler = 'true';
          item.style.cursor = 'pointer';

          // Use multiple event listeners for maximum compatibility
          const handleSnackbarChoice = async (e) => {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();

            // Extract the main title (first line or bold text)
            let choiceText = itemText.substring(0, 100);
            const titleEl = item.querySelector('div:first-child, span:first-child, strong, b, [class*="title"], [class*="Title"]');
            if (titleEl) {
              const titleText = (titleEl.textContent || '').trim();
              if (titleText.length > 5 && titleText.length < 100) {
                choiceText = titleText;
              }
            }

            const clickInfo = {
              tag: item.tagName?.toLowerCase() || 'div',
              text: choiceText,
              ariaLabel: item.getAttribute('aria-label') || '',
              role: item.getAttribute('role') || '',
              className: item.className || '',
              isDialogChoice: true,
              isSnackbarChoice: true  // Extra flag for debugging
            };

            console.log('[Click] Snackbar choice (priority):', clickInfo.text.substring(0, 50));
            await sendClickToKiro(clickInfo);
            setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
            return false;
          };

          // Attach to multiple events for reliability
          item.onclick = handleSnackbarChoice;
          item.addEventListener('click', handleSnackbarChoice, { capture: true });
          item.addEventListener('touchend', (e) => {
            e.preventDefault();
            handleSnackbarChoice(e);
          }, { passive: false });
        });
      }

      // Dialog choice elements (spec workflow options, modal choices, welcome screens)
      // These are clickable divs inside snackbar body or welcome screens that represent user choices
      const dialogChoiceSelectors = [
        '.kiro-snackbar-body > div',
        '.kiro-snackbar-body [class*="choice"]',
        '.kiro-snackbar-body [class*="option"]',
        '.kiro-snackbar [class*="choice"]',
        '.kiro-snackbar [class*="option"]',
        '[class*="dialog-choice"]',
        '[class*="dialogChoice"]',
        '[role="dialog"] [role="button"]',
        '[role="alertdialog"] [role="button"]',
        // Welcome/onboarding screen selectors
        '[class*="welcome"] [class*="choice"]',
        '[class*="welcome"] [class*="option"]',
        '[class*="Welcome"] [class*="Choice"]',
        '[class*="Welcome"] [class*="Option"]',
        '[class*="onboarding"] [class*="choice"]',
        '[class*="Onboarding"] [class*="Choice"]',
        '[class*="build"] [class*="choice"]',
        '[class*="Build"] [class*="Choice"]',
        // Direct choice/option cards
        '[class*="choice-card"]',
        '[class*="choiceCard"]',
        '[class*="ChoiceCard"]',
        '[class*="option-card"]',
        '[class*="optionCard"]',
        // Vibe/Spec specific
        '[class*="vibe"]',
        '[class*="Vibe"]',
        '[class*="spec"]',
        '[class*="Spec"]'
      ];
      dialogChoiceSelectors.forEach(sel => {
        try {
          content.querySelectorAll(sel).forEach(item => {
            // Skip if already has handler (including priority handler)
            if (item.onclick || item.dataset.kiroClickHandler) return;
            // Skip buttons (handled by notification selectors)
            if (item.tagName === 'BUTTON') return;
            // Skip if it's a container with too many children
            if (item.children.length > 10) return;
            // Skip if no meaningful text
            const itemText = (item.textContent || '').trim();
            if (itemText.length < 5) return;
            // Skip if it looks like a header/title (short text, no description)
            if (itemText.length < 20 && !item.querySelector('*')) return;

            // Check if it looks clickable (has cursor pointer or specific classes)
            const computedStyle = window.getComputedStyle(item);
            const hasPointer = computedStyle.cursor === 'pointer';
            const hasClickableClass = item.className && (
              item.className.includes('choice') ||
              item.className.includes('option') ||
              item.className.includes('clickable') ||
              item.className.includes('selectable') ||
              item.className.includes('action')
            );
            const hasTabIndex = item.getAttribute('tabindex') === '0';

            // Only make clickable if it appears to be interactive
            if (hasPointer || hasClickableClass || hasTabIndex || item.closest('.kiro-snackbar-body')) {
              item.style.cursor = 'pointer';
              item.onclick = async (e) => {
                e.preventDefault(); e.stopPropagation();

                // Extract the main title/text (first line or first child text)
                let choiceText = itemText.substring(0, 100);
                const firstChild = item.querySelector('div, span, p');
                if (firstChild) {
                  const firstText = (firstChild.textContent || '').trim();
                  if (firstText.length > 10 && firstText.length < 100) {
                    choiceText = firstText;
                  }
                }

                const clickInfo = {
                  tag: item.tagName?.toLowerCase() || 'div',
                  text: choiceText,
                  ariaLabel: item.getAttribute('aria-label') || '',
                  role: item.getAttribute('role') || '',
                  className: item.className || '',
                  isDialogChoice: true
                };
                console.log('[Click] Dialog choice:', clickInfo.text.substring(0, 50));
                await sendClickToKiro(clickInfo);
                // Refresh after clicking dialog choice
                setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
                return false;
              };
            }
          });
        } catch (e) { }
      });

      // Tool action buttons (edit, cancel, approve, run in tool/command panels)
      // These are icon buttons with codicons like edit, x, check, play
      const toolActionSelectors = [
        '[class*="tool-action"] button',
        '[class*="toolAction"] button',
        '[class*="action-bar"] button',
        '[class*="actionBar"] button',
        '[class*="command"] button[aria-label]',
        '[class*="background"] button[aria-label]',
        'button .codicon-edit',
        'button .codicon-check',
        'button .codicon-x',
        'button .codicon-play',
        'button .codicon-close',
        'button .codicon-pass',
        'button .codicon-run',
        'button .codicon-refresh',
        'button .codicon-stop'
      ];

      // Also find icon buttons by their codicon children
      const iconButtonPatterns = [
        { icon: 'codicon-edit', action: 'edit' },
        { icon: 'codicon-pencil', action: 'edit' },
        { icon: 'codicon-x', action: 'cancel' },
        { icon: 'codicon-close', action: 'cancel' },
        { icon: 'codicon-chrome-close', action: 'cancel' },
        { icon: 'codicon-check', action: 'approve' },
        { icon: 'codicon-pass', action: 'approve' },
        { icon: 'codicon-check-all', action: 'approve' },
        { icon: 'codicon-play', action: 'run' },
        { icon: 'codicon-run', action: 'run' },
        { icon: 'codicon-debug-start', action: 'run' },
        { icon: 'codicon-stop', action: 'stop' },
        { icon: 'codicon-debug-stop', action: 'stop' },
        { icon: 'codicon-refresh', action: 'retry' },
        { icon: 'codicon-sync', action: 'retry' }
      ];

      // Find all buttons with these icons
      iconButtonPatterns.forEach(({ icon, action }) => {
        try {
          content.querySelectorAll('.' + icon).forEach(iconEl => {
            // Find the parent button
            const btn = iconEl.closest('button, [role="button"]');
            if (!btn || btn.onclick) return;

            // Skip if it's in a tab (handled separately)
            if (btn.closest('[role="tab"]')) return;

            btn.style.cursor = 'pointer';
            btn.onclick = async (e) => {
              e.preventDefault(); e.stopPropagation();

              const ariaLabel = btn.getAttribute('aria-label') || '';
              const title = btn.getAttribute('title') || '';

              const clickInfo = {
                tag: 'button',
                text: ariaLabel || title || action,
                ariaLabel: ariaLabel,
                role: btn.getAttribute('role') || 'button',
                className: btn.className || '',
                actionType: action,
                isToolActionButton: true,
                isIconButton: true
              };
              console.log('[Click] Tool action button:', action, ariaLabel || title);
              await sendClickToKiro(clickInfo);
              // Refresh after clicking tool action
              setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
              return false;
            };
          });
        } catch (e) { }
      });

      // Also handle buttons with aria-labels that indicate actions
      const actionAriaLabels = ['edit', 'cancel', 'approve', 'run', 'stop', 'retry', 'trust', 'accept', 'reject', 'allow', 'deny'];
      content.querySelectorAll('button[aria-label], [role="button"][aria-label]').forEach(btn => {
        if (btn.onclick) return;
        if (btn.closest('[role="tab"]')) return;

        const ariaLabel = (btn.getAttribute('aria-label') || '').toLowerCase();
        const matchedAction = actionAriaLabels.find(action => ariaLabel.includes(action));

        if (matchedAction) {
          btn.style.cursor = 'pointer';
          btn.onclick = async (e) => {
            e.preventDefault(); e.stopPropagation();

            const clickInfo = {
              tag: 'button',
              text: btn.getAttribute('aria-label') || matchedAction,
              ariaLabel: btn.getAttribute('aria-label') || '',
              role: btn.getAttribute('role') || 'button',
              className: btn.className || '',
              actionType: matchedAction,
              isToolActionButton: true,
              isIconButton: !btn.textContent?.trim()
            };
            console.log('[Click] Tool action (aria):', matchedAction);
            await sendClickToKiro(clickInfo);
            setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
            return false;
          };
        }
      });

      // Tabs
      content.querySelectorAll('[role="tab"]').forEach(tab => {
        const closeBtn = tab.querySelector('[aria-label="close"], [class*="close"]');
        if (closeBtn) {
          closeBtn.style.cursor = 'pointer';
          closeBtn.onclick = async (e) => {
            e.preventDefault(); e.stopPropagation();
            const labelEl = tab.querySelector('.kiro-tabs-item-label, [class*="label"]');
            const tabLabel = labelEl ? labelEl.textContent.trim() : tab.textContent.trim();
            await sendClickToKiro({ tag: 'button', text: 'close', ariaLabel: 'close', role: 'button', isCloseButton: true, parentTabLabel: tabLabel });
            return false;
          };
        }

        tab.style.cursor = 'pointer';
        tab.onclick = async (e) => {
          if (e.target.closest('[aria-label="close"], [class*="close"], button')) return;
          e.preventDefault(); e.stopPropagation();
          const labelEl = tab.querySelector('.kiro-tabs-item-label, [class*="label"]');
          const labelText = labelEl ? labelEl.textContent.trim() : tab.textContent.trim();
          await sendClickToKiro({ tag: 'div', text: labelText, role: 'tab', isTab: true, tabLabel: labelText });
          return false;
        };
      });

      // Model selector buttons and dropdown options
      const modelNames = ['claude', 'sonnet', 'opus', 'haiku', 'auto', 'gpt', 'model', 'gemini', 'llama'];
      const modelSelectorSelectors = [
        '[class*="model-selector"]', '[class*="modelSelector"]', '[class*="ModelSelector"]',
        '[class*="model-dropdown"]', '[class*="modelDropdown"]', '[class*="ModelDropdown"]',
        '[aria-label*="model" i]', '[aria-label*="Model"]',
        '[class*="select-model"]', '[class*="selectModel"]',
        '[role="combobox"]'
      ];

      // Handle model selector buttons
      modelSelectorSelectors.forEach(sel => {
        try {
          content.querySelectorAll(sel).forEach(el => {
            if (el.onclick) return;
            el.style.cursor = 'pointer';
            el.onclick = async (e) => {
              e.preventDefault(); e.stopPropagation();
              const clickInfo = {
                tag: el.tagName?.toLowerCase() || 'button',
                text: (el.textContent || '').trim().substring(0, 100),
                ariaLabel: el.getAttribute('aria-label') || '',
                role: el.getAttribute('role') || 'button',
                className: el.className || '',
                isModelSelector: true
              };
              await sendClickToKiro(clickInfo);
              // Refresh snapshot after clicking to show dropdown
              setTimeout(() => fetchChatSnapshot(selectedCascadeId), 150);
              return false;
            };
          });
        } catch (e) { }
      });

      // Handle dropdown menu items (model options) - including Kiro-specific classes
      const dropdownItemSelectors = [
        '.kiro-dropdown-item',
        '.kiro-dropdown-menu > div',
        '[role="option"]', '[role="menuitem"]', '[role="listitem"]',
        '[class*="dropdown-item"]', '[class*="dropdownItem"]', '[class*="DropdownItem"]',
        '[class*="menu-item"]', '[class*="menuItem"]', '[class*="MenuItem"]'
      ];

      dropdownItemSelectors.forEach(sel => {
        try {
          content.querySelectorAll(sel).forEach(el => {
            if (el.onclick) return;
            // Skip if it's inside a tab
            if (el.closest('[role="tab"]')) return;

            const elText = (el.textContent || '').toLowerCase();
            const isModelOption = modelNames.some(m => elText.includes(m));

            // Only attach handler if it looks like a model option
            if (!isModelOption) return;

            el.style.cursor = 'pointer';
            el.onclick = async (e) => {
              e.preventDefault(); e.stopPropagation();

              // Extract just the model name for cleaner matching
              let modelText = (el.textContent || '').trim();
              // Try to get just the first line (model name)
              const firstLine = modelText.split('\n')[0].trim();
              if (firstLine.length > 5 && firstLine.length < 50) {
                modelText = firstLine;
              }

              const clickInfo = {
                tag: el.tagName?.toLowerCase() || 'div',
                text: modelText.substring(0, 50),
                ariaLabel: el.getAttribute('aria-label') || '',
                role: el.getAttribute('role') || 'option',
                className: el.className || '',
                isModelOption: true,
                isModelSelector: false
              };
              await sendClickToKiro(clickInfo);
              // Refresh snapshot after selecting option
              setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
              return false;
            };
          });
        } catch (e) { }
      });

      // Also detect model-related buttons by text content
      content.querySelectorAll('button, [role="button"]').forEach(btn => {
        if (btn.onclick) return;
        const btnText = (btn.textContent || '').toLowerCase();
        const isModelRelated = modelNames.some(m => btnText.includes(m));

        if (isModelRelated) {
          btn.style.cursor = 'pointer';
          btn.onclick = async (e) => {
            e.preventDefault(); e.stopPropagation();
            const clickInfo = {
              tag: 'button',
              text: (btn.textContent || '').trim().substring(0, 100),
              ariaLabel: btn.getAttribute('aria-label') || '',
              role: btn.getAttribute('role') || 'button',
              className: btn.className || '',
              isModelSelector: true
            };
            await sendClickToKiro(clickInfo);
            setTimeout(() => fetchChatSnapshot(selectedCascadeId), 150);
            return false;
          };
        }
      });

      // File links
      const fileExtensions = /\.(ts|tsx|js|jsx|py|java|html|css|json|md|yaml|yml|xml|sql|go|rs|c|cpp|h|cs|rb|php|sh|vue|svelte)$/i;
      content.querySelectorAll('a, code, span, [class*="file"], [class*="path"], [data-path]').forEach(el => {
        if (el.onclick) return;
        const text = (el.textContent || '').trim();
        const dataPath = el.getAttribute('data-path') || '';
        const href = el.getAttribute('href') || '';

        if (fileExtensions.test(text) || fileExtensions.test(dataPath) || fileExtensions.test(href)) {
          const filePath = dataPath || text || href;
          el.style.cursor = 'pointer';
          el.style.color = '#7eb6ff';
          el.title = `Open ${filePath} in Editor`;
          el.onclick = async (e) => { e.preventDefault(); e.stopPropagation(); await openFileInEditor(filePath); return false; };
        }
      });

      // Buttons and clickable elements
      const clickableSelectors = ['button', '[role="button"]', '[role="menuitem"]', '[role="option"]', '[role="checkbox"]', 'a[href]', '[tabindex="0"]'];
      const allClickables = new Set();
      clickableSelectors.forEach(sel => { try { content.querySelectorAll(sel).forEach(el => allClickables.add(el)); } catch (e) { } });

      allClickables.forEach(el => {
        if (el.matches && el.matches('[contenteditable], textarea, input:not([type="checkbox"])')) return;
        if (el.closest('[role="tab"]') || el.closest('.kiro-toggle-switch') || el.onclick) return;

        el.style.cursor = 'pointer';
        el.onclick = async (e) => {
          e.preventDefault(); e.stopPropagation();
          const clickInfo = {
            tag: el.tagName?.toLowerCase() || '',
            text: (el.textContent || '').trim().substring(0, 100),
            ariaLabel: el.getAttribute('aria-label') || '',
            role: el.getAttribute('role') || '',
            className: el.className || ''
          };
          await sendClickToKiro(clickInfo);
          return false;
        };
      });

      // Chat history items - detect and make clickable
      // Kiro history items typically have: icon, title text, and date
      // We need to find these items even if they don't have semantic roles

      // First, find all potential history item containers
      const potentialHistoryItems = [];

      // Look for elements that contain date patterns (history items have dates)
      const datePattern = /\d{1,2}\/\d{1,2}\/\d{4}|\d{1,2}:\d{2}:\d{2}\s*(AM|PM)?/i;

      content.querySelectorAll('div, li, article, section').forEach(el => {
        // Skip if already has handler
        if (el.onclick) return;
        // Skip inputs
        if (el.matches('[contenteditable], textarea, input')) return;
        // Skip very large containers
        if (el.children.length > 15) return;
        // Skip if inside tab or toggle
        if (el.closest('[role="tab"]') || el.closest('.kiro-toggle-switch')) return;

        const text = el.textContent || '';
        const hasDate = datePattern.test(text);
        const hasIcon = el.querySelector('svg, [class*="icon"], [class*="Icon"], .codicon');
        const textLength = text.trim().length;

        // History items typically have: date + some text (20-500 chars) + possibly an icon
        if (hasDate && textLength > 20 && textLength < 500) {
          // Check if this looks like a list item (has siblings with similar structure)
          const parent = el.parentElement;
          const siblings = parent ? [...parent.children].filter(c => c.tagName === el.tagName) : [];
          const isInList = siblings.length > 1;

          // Also check for cursor pointer style or clickable class
          const computedStyle = window.getComputedStyle(el);
          const hasPointer = computedStyle.cursor === 'pointer';
          const hasClickableClass = el.className && (
            el.className.includes('item') ||
            el.className.includes('Item') ||
            el.className.includes('row') ||
            el.className.includes('Row') ||
            el.className.includes('entry') ||
            el.className.includes('Entry')
          );

          if (isInList || hasPointer || hasClickableClass || hasIcon) {
            potentialHistoryItems.push(el);
          }
        }
      });

      // Also add standard selectors
      const historySelectors = [
        '[role="listitem"]',
        '[role="option"]',
        '[class*="history-item"]',
        '[class*="historyItem"]',
        '[class*="session-item"]',
        '[class*="sessionItem"]',
        '[class*="chat-item"]',
        '[class*="chatItem"]'
      ];

      historySelectors.forEach(selector => {
        try {
          content.querySelectorAll(selector).forEach(el => {
            if (!el.onclick && !potentialHistoryItems.includes(el)) {
              potentialHistoryItems.push(el);
            }
          });
        } catch (e) { }
      });

      // Attach click handlers to all potential history items
      potentialHistoryItems.forEach(el => {
        el.style.cursor = 'pointer';
        el.onclick = async (e) => {
          e.preventDefault();
          e.stopPropagation();

          // Extract the title (first meaningful text, not the date)
          let itemText = '';
          const textNodes = [];
          el.querySelectorAll('span, p, div').forEach(child => {
            const t = child.textContent?.trim();
            if (t && t.length > 5 && !datePattern.test(t)) {
              textNodes.push(t);
            }
          });
          itemText = textNodes[0] || el.textContent?.trim().split('\n')[0] || '';
          itemText = itemText.substring(0, 100);

          const clickInfo = {
            tag: el.tagName?.toLowerCase() || 'div',
            text: itemText,
            ariaLabel: el.getAttribute('aria-label') || '',
            role: el.getAttribute('role') || 'listitem',
            className: el.className || '',
            isHistoryItem: true
          };

          await sendClickToKiro(clickInfo);

          // Refresh snapshot after clicking history item
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 200);
          return false;
        };
      });
    }

    // =============================================================================
    // Kiro Communication
    // =============================================================================

    // Rate limiting for message sending
    let lastMessageTime = 0;
    const MESSAGE_RATE_LIMIT_MS = 500; // Minimum 500ms between messages
    let pendingMessage = false;

    async function sendToKiro(message) {
      if (!message || !selectedCascadeId) return;

      // Rate limiting check
      const now = Date.now();
      if (now - lastMessageTime < MESSAGE_RATE_LIMIT_MS) {
        if (!pendingMessage) {
          showToast('Please wait before sending another message', 1500);
        }
        return;
      }

      if (pendingMessage) {
        showToast('Message already being sent', 1500);
        return;
      }

      pendingMessage = true;
      lastMessageTime = now;

      try {
        const r = await fetch(`/send/${selectedCascadeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const result = await r.json();
        if (result.success) {
          showToast('Sent!', 1500, true);
          // Immediately start polling for updates after send
          // Multiple rapid refreshes to catch the response quickly
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 100);
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 300);
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 600);
          setTimeout(() => fetchChatSnapshot(selectedCascadeId), 1000);
        }
      } catch (e) {
        // Silently fail
      } finally {
        pendingMessage = false;
      }
    }

    async function sendClickToKiro(clickInfo, retryCount = 0) {
      if (!selectedCascadeId) return;

      const isNavigation = clickInfo.ariaLabel?.toLowerCase().includes('back') ||
        clickInfo.ariaLabel?.toLowerCase().includes('close') ||
        clickInfo.text?.toLowerCase().includes('back') ||
        clickInfo.role === 'tab';

      if (isNavigation) navigationPending = true;

      try {
        const response = await fetch(`/click/${selectedCascadeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(clickInfo)
        });

        const result = await response.json();

        // Handle retry for model option clicks (dropdown was opened, need to click option)
        if (result.needsRetry && clickInfo.isModelOption && retryCount < 2) {
          console.log('[Click] Dropdown opened, retrying option click in 200ms...');
          await new Promise(resolve => setTimeout(resolve, 200));
          return sendClickToKiro(clickInfo, retryCount + 1);
        }

        if (isNavigation) setTimeout(() => fetchChatSnapshot(selectedCascadeId), 150);

        return result;
      } catch (e) {
        navigationPending = false;
        return { success: false, error: e.message };
      }
    }

    async function openFileInEditor(filePath) {
      if (!selectedCascadeId || !filePath) return;

      // Clean the file path - remove extra whitespace, quotes, backticks, and common prefixes
      let cleanPath = filePath.trim()
        .replace(/^['"`]+|['"`]+$/g, '')  // Remove surrounding quotes
        .replace(/^\s*#\s*/, '')           // Remove markdown header prefix
        .replace(/^\s*[-*]\s*/, '')        // Remove list markers
        .replace(/\s+/g, ' ')              // Normalize whitespace
        .trim();

      // Extract just the file path if it contains extra text (e.g., "file.ts - some description")
      const pathMatch = cleanPath.match(/^([^\s]+\.(ts|tsx|js|jsx|py|java|html|css|json|md|yaml|yml|xml|sql|go|rs|c|cpp|h|cs|rb|php|sh|vue|svelte))/i);
      if (pathMatch) {
        cleanPath = pathMatch[1];
      }

      showToast(`Opening ${cleanPath}...`, 1500);

      // Switch to Editor tab
      const editorTab = document.querySelector('[data-panel="editor"]');
      if (editorTab) {
        navTabs.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        editorTab.classList.add('active');
        Object.values(panels).forEach(p => { if (p.panel) p.panel.classList.remove('active'); });
        panels.editor.panel.classList.add('active');
        activePanel = 'editor';
        showLoading('editor', 'Loading file...');
      }

      try {
        // Try direct file read first
        const readResult = await fetch(`/readFile/${selectedCascadeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filePath: cleanPath })
        });

        if (readResult.ok) {
          const data = await readResult.json();
          if (data.content) {
            renderEditorSnapshot(data);
            showToast(`Opened ${data.fileName || cleanPath}`, 1500, true);
            return;
          }
        } else {
          // Log the error for debugging
          const errorData = await readResult.json().catch(() => ({}));
          console.log('[OpenFile] Direct read failed:', errorData.error || readResult.status);
        }

        // Fallback: Click file link in Kiro to open it there
        await fetch(`/click/${selectedCascadeId}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ tag: 'a', text: cleanPath, isFileLink: true, filePath: cleanPath })
        });

        // Wait for Kiro to open the file
        await new Promise(resolve => setTimeout(resolve, 800));

        const fetchEditor = async () => {
          try {
            const r = await fetch(`/editor/${selectedCascadeId}`);
            if (r.ok) {
              const data = await r.json();
              if (data.content || data.html) {
                renderEditorSnapshot(data);
                showToast(`Opened ${data.fileName || cleanPath}`, 1500, true);
                return true;
              }
            }
          } catch (e) { }
          return false;
        };

        if (!await fetchEditor()) {
          await new Promise(resolve => setTimeout(resolve, 500));
          if (!await fetchEditor()) {
            showEmptyState('editor', 'codicon-file-code', `Could not load ${cleanPath}. Try opening it in Kiro first.`);
          }
        }
      } catch (e) {
        console.error('[OpenFile] Error:', e);
        showToast('Failed to open file');
        showEmptyState('editor', 'codicon-file-code', 'Failed to load file.');
      }
    }

    // =============================================================================
    // Event Listeners Setup
    // =============================================================================
    $('editorExplorerBtn').onclick = (e) => { e.stopPropagation(); toggleFileTree(); };
    fileTreeDropdown.onclick = (e) => { e.stopPropagation(); };

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      if (fileTreeOpen && !e.target.closest('.editor-explorer-wrapper')) closeFileTree();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && fileTreeOpen) closeFileTree();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && (!ws || ws.readyState !== WebSocket.OPEN)) connect();
    });

    // Initialize
    connect();
  </script>
