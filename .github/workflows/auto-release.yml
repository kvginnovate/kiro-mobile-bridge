name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/auto-release.yml'
      - '!package.json'  # Prevent infinite loop
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci] or is a version bump
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, 'chore: bump version')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          # Get current version
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"
          echo "prev_version=$CURRENT" >> $GITHUB_OUTPUT
          
          # Bump patch version
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_VERSION="$major.$minor.$((patch + 1))"
          echo "New version: $NEW_VERSION"
          
          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Get meaningful commit message
        id: commit_info
        run: |
          # Get the commit message, handling merge commits
          HEAD_MSG="${{ github.event.head_commit.message }}"
          
          # Check if this is a merge commit (starts with "Merge")
          if [[ "$HEAD_MSG" == Merge* ]]; then
            MEANINGFUL_MSG=$(git log --format=%s --no-merges -1 HEAD^2 2>/dev/null || echo "$HEAD_MSG")
          else
            MEANINGFUL_MSG="$HEAD_MSG"
          fi
          
          # Use heredoc for multi-line output
          {
            echo "message<<EOF"
            echo "$MEANINGFUL_MSG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Update CHANGELOG
        run: |
          DATE=$(date +%Y-%m-%d)
          COMMIT_MSG="${{ steps.commit_info.outputs.message }}"
          
          # Check if today's date section already exists
          if grep -q "## $DATE" CHANGELOG.md 2>/dev/null; then
            # Add to existing date section - insert after the date header
            TEMP_FILE=$(mktemp)
            awk -v date="## $DATE" -v msg="$COMMIT_MSG" '
              $0 == date { print; getline; print; 
                split(msg, lines, "\n");
                for (i in lines) {
                  if (lines[i] != "") print "- " lines[i]
                }
                next
              }
              { print }
            ' CHANGELOG.md > "$TEMP_FILE"
            mv "$TEMP_FILE" CHANGELOG.md
          else
            # Create new date section
            TEMP_FILE=$(mktemp)
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "## $DATE"
              echo ""
              echo "$COMMIT_MSG" | while IFS= read -r line; do
                if [ -n "$line" ]; then
                  echo "- $line"
                fi
              done
              echo ""
            } > "$TEMP_FILE"
            
            # Append existing changelog entries (skip header lines)
            if [ -f CHANGELOG.md ]; then
              tail -n +5 CHANGELOG.md >> "$TEMP_FILE"
            fi
            
            mv "$TEMP_FILE" CHANGELOG.md
          fi
          
          # Debug: show first 30 lines
          echo "=== CHANGELOG Preview ==="
          head -30 CHANGELOG.md

      - name: Commit version bump
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: kiro-mobile-bridge v${{ steps.bump.outputs.version }}
          generate_release_notes: false
          body: |
            ## kiro-mobile-bridge v${{ steps.bump.outputs.version }}
            
            ${{ steps.commit_info.outputs.message }}
            
            ### Install
            ```bash
            npx kiro-mobile-bridge
            ```
            
            Or install globally:
            ```bash
            npm install -g kiro-mobile-bridge
            ```
            
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v${{ steps.bump.outputs.prev_version }}...v${{ steps.bump.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
